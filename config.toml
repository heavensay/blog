baseURL = 'https://heavensay.github.io/'
defaultContentLanguage = "zh-cn"
title = '技术blog'
#theme= "ananke"
hasCJKLanguage = true # 开启中文完美分词与字数统计
theme = "lotusdocs"   #指定 LotusDocs 主题

[markup.goldmark.renderer]
  unsafe = true

# ⚡ 核心修复：强行关闭 Go Modules 编译，改用主题自带的资产包
# ============================================================================
# 修复核心：将云端 Go Module 依赖强制映射到本地已下载的 Submodule 目录
# ============================================================================

[module]
  # 1. 告诉 Hugo：如果看到云端路径，直接去本地对应的 themes 文件夹里找
  replacements = [
    "github.com/colinwilson/lotusdocs -> lotusdocs",
	"github.com/gohugoio/hugo-mod-bootstrap-scss/v5 -> hugo-mod-bootstrap-scss",
    "github.com/gohugoio/hugo-mod-jslibs-dist/popperjs/v2 -> hugo-mod-jslibs-dist/popperjs",
    # ⚡ 新增：把最后的 twbs/bootstrap 联网请求，强行拦截到你已下载的本地 bootstrap-scss 目录
    "github.com/twbs/bootstrap -> hugo-mod-bootstrap-scss",
    "github.com/twbs/bootstrap -> bootstrap"
  ]

  # 2. 导入 LotusDocs 核心
  [[module.imports]]
    path = "github.com/colinwilson/lotusdocs"

  # 3. 导入 Bootstrap SCSS 依赖
  [[module.imports]]
    path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"
  # 虚拟导入 Popperjs，让 Hugo 以为拉到了，实际读取时去读 lotusdocs 内部
  [[module.imports]]
    path = "github.com/gohugoio/hugo-mod-jslibs-dist/popperjs/v2"

  # ⚡ 告诉 Hugo 声明加载这个底层模块
  [[module.imports]]
    path = "github.com/twbs/bootstrap"

  [[module.mounts]]
    source = "content"
    target = "content"

  [[module.mounts]]
    source = "store/blog-content/技术笔记"
    target = "content/blog/tech"

  [[module.mounts]]
    source = "store/blog-content/knowledge-test"
    target = "content/blog/knowledge-test"

  [[module.mounts]]
    source = "store/blog-content/attach-files"
    target = "content/blog/attach-files"

# ============================================================================
# 2. 目录与多分类逻辑 (Content Logic)
# ============================================================================
# 告诉 Hugo 哪些目录的内容需要作为主干平铺和展示
mainSections = ["docs", "posts", "blog", "blog-content", "wiz-note"]

# 禁用无用的标签/分类聚合页，完全交由文档树管理
disableKinds = ["taxonomy", "term"]

# 输出配置：LotusDocs 需要生成额外的 search.json 用于前端全文检索
[outputs]
	home = ["HTML", "RSS", "JSON"]

# ============================================================================
# 3. lotus顶部导航栏配置 (Navbar Menu)
# ============================================================================
[[menu.primary]]
	name = "首页"
	url = "/"
	weight = 10

[[menu.primary]]
	name = "技术"
	url = "/docs/"
	weight = 20

[[menu.primary]]
	name = "AI"
	url = "/tech/技术笔记"
	weight = 30

[[menu.primary]]
	name = "笔记测试"
	url = "/tech/knowledge-test"
	weight = 30

[[menu.primary]]
	name = "笔记"
	url = "/wiz-note/"
	weight = 40

[languages.zh-cn]
	languageName = "简体中文"
	weight = 1

[frontmatter]
  # 严格定义 Hugo 读取时间的顺序：
  # 1. 优先读取你手动写的 date 字段
  # 2. 如果没写，自动抓取文件的磁盘创建/修改时间 (:fileModTime)
  # 3. 兜底读取发布时间
  # date = ["date", ":fileModTime", "publishDate"]
  # 当文章缺失 date 字段时，依次尝试读取：物理字段 -> 发布时间 -> Git提交时间 -> 文件最后修改时间
  date = ["date", "publishDate", ":git", ":fileModTime"]
  # 同理，自动获取最后修改时间
  lastmod = ["lastmod", ":git", ":fileModTime", "date"]
[content]
  # 允许 Hugo 将非 .md 文件（如图片）作为页面资源一并解析和复制
  publishResources = true

# ============================================================================
# 4. LotusDocs 主题专属高级参数 (Params)
# ============================================================================
[params]
	description = "保持思考，记录沉淀。基于 Hugo & LotusDocs 构建的个人全功能知识库。"
	# 强行把默认的 docs
	docsSection = "docs"

	author = "默认作者名"

	# 🌟 LotusDocs 官方隐藏的复合排序机制：
	# 设定为 "weight"，当权重相同时，Hugo 会自动降级触发底层的 Date 属性。
	sidebarSortOrder = "weight"

	# 🌟 必须显式开启全局导航条，否则主题不会加载菜单骨架
    navigationbar = true

	# 🌟 核心规范：确保以下两个关于颜色模式的参数没有被注释，且设为默认值
    darkMode = true
    # 可选值: "light", "dark", "auto" (自动跟随系统环境)
    defaultColorMode = "auto"

    # 🌟 核心规范 3：这才是真正控制【大首页】各模块隐藏的专属官方开关！
[params.frontpage]
	# 彻底关闭大首页上的左侧侧边栏、右侧大纲、面包屑导航（这3行在首页的权重最高）
	sidebar = false
	toc = false
	breadcrumbs = false

# ⚡ 核心：LotusDocs 深度自定义参数
[params.lotusdocs]
	repo = "https://github.com/heavensay" # 你的 GitHub 仓库
	branch = "master"

    # 顶部导航条高级设置
    [params.lotusdocs.navbar]
	    showLogo = true
	    logoText = "LotusDocs"
	    search = false            # ⚡ 开启顶级 FlexSearch 实时前端全文检索
	    githubHeaderIcon = true   # 右上角显示 GitHub 图标
	    themeToggle = true        # ⚡ 开启一键切换“白天/暗黑模式”按钮

    # 左侧侧边栏树状菜单设置
    [params.lotusdocs.sidebar]
    	collapsible = true        # 允许左侧分类菜单点击折叠/展开

    # 右侧文章大纲设置
    [params.lotusdocs.toc]
    	enable = true             # ⚡ 开启右侧自动提取文章标题大纲 (Table of Contents)

    # 脚部版权声明
    [params.lotusdocs.footer]
    	copyright = "2026 Heavensay Powered by Hugo & LotusDocs"

[[cascade]]
  type = "docs"
  layout = "single"
  [cascade._target]
    path = "/posts/**"

# 第 2 个级联配置：针对 tech 目录
[[cascade]]
  type = "docs"
  layout = "single"
  [cascade._target]
    path = "/blog/**"